<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Noisy Colouring Book</title>
  <link rel="stylesheet" href="style.css?v=24">
</head>
<body>

  <!--
    VB6 START.FRM: Main screen with splash background + category row.
    Background = noisy picture,
    horizontal row of up to 5 DirButtons with left/right scroll arrows
    inside a cyan-bordered rounded rectangle near the top.
  -->
  <div id="start-screen" class="screen active">
    <div id="start-bg">
      <div id="start-bg-pattern"></div>
      <div id="start-bg-overlay"></div>
    </div>
    <div id="cat-strip">
      <div id="cat-row"></div>
    </div>
    <div id="start-title">My Noisy<br>Colouring Book</div>
    <!-- Floating decorations — clipped to avoid overlapping categories -->
    <div id="deco-area">
      <div class="floating-deco deco-1"></div>
      <div class="floating-deco deco-2"></div>
      <div class="floating-deco deco-3"></div>
      <div class="floating-deco deco-4"></div>
      <div class="floating-deco deco-5"></div>
      <div class="floating-deco deco-6"></div>
      <div class="floating-deco deco-7"></div>
      <div class="floating-deco deco-8"></div>
      <div class="floating-deco deco-9"></div>
      <div class="floating-deco deco-10"></div>
      <div class="floating-deco deco-11"></div>
      <div class="floating-deco deco-12"></div>
      <div class="floating-deco deco-13"></div>
      <div class="floating-deco deco-14"></div>
    </div>
    <button id="btn-help" class="help-btn" aria-label="Help">?</button>
  </div>

  <!--
    VB6 CREATE.FRM: Colouring screen.
    Canvas 15/16 width, palette bar 1/16 on right.
    VB6 tool buttons: Undo (0), Load Picture (1), Clear (2).
  -->
  <div id="colour-screen" class="screen">
    <button id="btn-back-colour" class="home-overlay-btn" aria-label="Home" title="Home (Esc)">
      <svg viewBox="0 0 32 32" width="32" height="32"><path d="M16,4 L4,14 L8,14 L8,26 L14,26 L14,19 L18,19 L18,26 L24,26 L24,14 L28,14 Z" fill="#fff"/></svg>
    </button>
    <div id="canvas-area">
      <button id="btn-sound" class="sound-overlay-btn" aria-label="Sound" title="Sound ON (F2)">
        <svg viewBox="0 0 32 32" width="32" height="32"><path d="M8,12 L12,12 L18,7 L18,25 L12,20 L8,20 Z" fill="#fff"/><path class="sound-waves" d="M21,11 C23,13 23,19 21,21 M24,8 C27,12 27,20 24,24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div id="svg-container"></div>
    </div>
    <div id="current-colour"></div>
    <div id="palette-bar">
      <div id="colour-buttons"></div>
      <div id="tool-buttons">
        <!-- VB6 SSCommand1(0) = Undo -->
        <button id="btn-undo" class="tool-btn" aria-label="Undo" title="Undo (Ctrl-Z)">
          <svg viewBox="0 0 32 32" width="32" height="32"><path d="M8,16 L16,8 L16,12 C22,12 26,16 26,22 C24,18 20,16 16,16 L16,20 Z" fill="#fff"/></svg>
        </button>
        <!-- VB6 SSCommand1(1) = Load Picture (opens LOADPIC) -->
        <button id="btn-load" class="tool-btn" aria-label="Load Picture" title="Load Picture (+)">
          <svg viewBox="0 0 32 32" width="32" height="32"><rect x="6" y="8" width="20" height="16" rx="2" fill="none" stroke="#fff" stroke-width="2"/><polygon points="12,20 16,13 20,20" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="21" cy="12" r="2" fill="#fff"/></svg>
        </button>
        <!-- VB6 SSCommand1(2) = Clear -->
        <button id="btn-clear" class="tool-btn" aria-label="Clear" title="Clear (Enter)">
          <svg viewBox="0 0 32 32" width="32" height="32"><rect x="8" y="8" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="2"/><line x1="12" y1="12" x2="20" y2="20" stroke="#fff" stroke-width="2"/><line x1="20" y1="12" x2="12" y2="20" stroke="#fff" stroke-width="2"/></svg>
        </button>
        <!-- Sound button moved to top-right overlay -->
      </div>
    </div>
  </div>

  <!--
    VB6 LOADPIC.FRM: "Choose Picture" modal dialog.
    Shows one WMF preview at a time, prev/OK/next buttons at bottom.
    Dark background (maroon). Opened from colour screen's Load Picture button.
  -->
  <div id="scene-overlay">
    <div id="scene-dialog">
      <div id="scene-preview"></div>
      <div id="scene-nav">
        <button id="scene-prev" class="scene-btn" aria-label="Previous picture">&#9664;</button>
        <button id="scene-ok" class="scene-btn scene-ok-btn" aria-label="OK">OK</button>
        <button id="scene-next" class="scene-btn" aria-label="Next picture">&#9654;</button>
      </div>
    </div>
  </div>

  <script src="wmf2svg.js"></script>
  <script src="noisy.js?v=29"></script>
</body>
</html>
